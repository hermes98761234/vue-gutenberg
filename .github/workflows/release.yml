name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Package plugin zip
        run: |
          mkdir -p dist/vue-gutenberg
          cp vue-gutenberg.php dist/vue-gutenberg/
          cp -r build dist/vue-gutenberg/build
          cd dist && zip -r vue-gutenberg.zip vue-gutenberg
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/vue-gutenberg.zip --generate-notes
